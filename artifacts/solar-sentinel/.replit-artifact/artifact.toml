kind = "web"
previewPath = "/"
title = "SolarSentinel"
version = "1.0.0"
id = "artifacts/solar-sentinel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18433

[services.development]
run = "pnpm --filter @workspace/solar-sentinel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solar-sentinel", "run", "build" ]
publicDir = "artifacts/solar-sentinel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18433"
BASE_PATH = "/"
